name: Publish Chrome Extension

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Only package the files the extension actually needs — not worker/,
      # docs/, or other repo files.
      - name: Build extension zip
        run: |
          zip -r extension.zip manifest.json content.js styles.css auth-callback.js src assets

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Chrome Web Store CLI
        run: npm i -g chrome-webstore-upload-cli@3

      # CLI v3+ requires credentials via environment variables; the old
      # --client-id/--client-secret/--refresh-token flags throw an error.
      - name: Upload to Chrome Web Store
        env:
          EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}
          CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}
        run: |
          chrome-webstore-upload upload --source extension.zip --auto-publish
